<!DOCTYPE html>
<html>
<head>
    <script type="text/javascript" src="/homey.js" data-origin="manager"></script>
    <style>
        body {
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: var(--homey-color-text);
            background-color: transparent;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .header {
            font-size: 0.8em;
            opacity: 0.6;
            margin-bottom: 2px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .route {
            font-weight: 600;
            font-size: 1.1em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ship {
            font-size: 0.9em;
            opacity: 0.7;
            margin-bottom: 8px;
        }
        .countdown {
            font-size: 2.5em;
            font-weight: 700;
            line-height: 1.0;
            margin-bottom: 4px;
        }
        .status {
             font-size: 0.85em;
             opacity: 0.8;
        }
        .departed {
            color: var(--homey-color-red);
        }
    </style>
</head>
<body>
    <div id="content">Loading...</div>

    <script type="text/javascript">
        function onHomeyReady(Homey) {
            Homey.ready();
            
            async function update() {
                try {
                    // getDeviceIds() may return an array or an object keyed by ID
                    const raw = await Homey.getDeviceIds();
                    let ids = [];
                    if (Array.isArray(raw)) {
                        ids = raw;
                    } else if (raw && typeof raw === 'object') {
                        ids = Object.keys(raw);
                    }

                    if (ids.length === 0) {
                        document.getElementById('content').innerText = 'No device selected';
                        return;
                    }

                    const deviceId = ids[0];
                    const data = await Homey.api('GET', `/?deviceId=${deviceId}`);
                    render(data);
                } catch (err) {
                    console.error(err);
                    document.getElementById('content').innerText = 'Error refreshing data';
                }
            }

            function render(data) {
                const content = document.getElementById('content');
                
                if (data.booking_status === 'Departed') {
                    content.innerHTML = `
                        <div class="header">Status</div>
                        <div class="route">${data.route || 'Unknown Route'}</div>
                        <div class="ship">${data.ship_name || ''}</div>
                        <div class="countdown departed">Departed</div>
                        <div class="status">Was: ${data.departure_time || '-'}</div>
                    `;
                    return;
                }

                const days = data.days_until_departure;
                const hours = data.measure_time_remaining;
                
                let timeStr = '';
                if (hours > 48) {
                    timeStr = `${Math.round(days)} days`;
                } else if (hours > 0) {
                    timeStr = `${hours} hours`;
                } else {
                    timeStr = 'Soon';
                }

                content.innerHTML = `
                    <div class="header">Next Sailing</div>
                    <div class="route">${data.route || 'Unknown Route'}</div>
                    <div class="ship">${data.ship_name || ''}</div>
                    <div class="countdown">${timeStr}</div>
                    <div class="status">Dep: ${data.departure_time || '-'}</div>
                `;
            }

            update();
            setInterval(update, 60000); // Update every minute
        }
    </script>
</body>
</html>
